cors:
  originPatterns: http://localhost:8080,http://localhost:3000,https://www.erudio.com.br
file:
  upload-dir: /Programacao/java/rest-with-spring/UploadDir
spring:
  application:
    name: rest-with-spring
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/rest_with_spring?useTimezone=true&serverTimezone=UTC
    username: root
    password: akz
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
    show-sql: false
